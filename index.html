<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Weather</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weather">
  <meta name="theme-color" content="#07101f">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #07101f;
      --card:   rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.09);
      --muted:  rgba(255,255,255,0.32);
      --gap:    7px;
      --r:      15px;
    }

    html { background: var(--bg); }

    body {
      height: 100dvh;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #fff;
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      cursor: pointer;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 45% at 18% 8%,  rgba(30,100,210,0.22) 0%, transparent 68%),
        radial-gradient(ellipse 55% 55% at 82% 85%, rgba(15,70,160,0.16) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /*
      GRID  3 columns x 3 rows
      R1: Outdoor (col 1-2)  | Wind (col 3)
      R2: Rain (col 1)       | Barn (col 2)     | Pressure (col 3)
      R3: Solar/UV (col 1-2) | Soil (col 3)
    */
    .dashboard {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: repeat(3, 1fr);
      gap: var(--gap);
      padding: var(--gap);
      height: 100%;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .dashboard.loaded { opacity: 1; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.12s ease;
    }
    .card:active { background: rgba(255,255,255,0.13); }
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .c-out  { background: rgba(30,100,220,0.17); border-color: rgba(100,165,255,0.20); }
    .c-wind { background: rgba(80,210,170,0.09); border-color: rgba(80,210,170,0.18); }
    .c-rain { background: rgba(70,145,255,0.10); border-color: rgba(70,145,255,0.22); }
    .c-uv   { background: rgba(255,200,55,0.08); border-color: rgba(255,200,55,0.18); }
    .c-soil { background: rgba(100,190,90,0.09); border-color: rgba(100,190,90,0.22); }

    .g-outdoor  { grid-column: 1 / 3; grid-row: 1; }
    .g-wind     { grid-column: 3;     grid-row: 1; }
    .g-rain     { grid-column: 1;     grid-row: 2; }
    .g-barn     { grid-column: 2;     grid-row: 2; }
    .g-pressure { grid-column: 3;     grid-row: 2; }
    .g-solar    { grid-column: 1 / 3; grid-row: 3; }
    .g-soil     { grid-column: 3;     grid-row: 3; }

    .lbl {
      font-size: 8px; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px; flex-shrink: 0;
    }
    .spacer { flex: 1; min-height: 0; }

    .frows { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .frow  { display: flex; justify-content: space-between; align-items: baseline; }
    .fk    { font-size: 9px;  color: var(--muted); }
    .fv    { font-size: 11px; color: rgba(255,255,255,0.82); font-weight: 500; }

    /* OUTDOOR - horizontal layout inside single-row wide card */
    .out-body {
      display: flex; align-items: center;
      gap: 14px; flex: 1; min-height: 0;
    }
    .out-temp-wrap { flex-shrink: 0; }
    .out-temp {
      font-size: clamp(52px, 14vw, 68px);
      font-weight: 100; letter-spacing: -4px; line-height: 1;
    }
    .out-deg {
      font-size: clamp(24px, 6vw, 30px);
      font-weight: 200; letter-spacing: -1px; vertical-align: 16px;
    }
    .out-feels { font-size: 9.5px; color: var(--muted); margin-top: 2px; }
    .out-stats { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .stat-row  { display: flex; justify-content: space-between; align-items: center; }
    .stat-k    { font-size: 9.5px; color: var(--muted); }
    .stat-v    { font-size: 11.5px; color: rgba(255,255,255,0.88); font-weight: 500; }

    .hum-track {
      height: 2.5px; background: rgba(255,255,255,0.08);
      border-radius: 2px; margin-top: 2px; overflow: hidden;
    }
    .hum-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a9eff, #62d4ff);
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .updated {
      font-size: 7.5px; letter-spacing: 0.07em;
      color: rgba(255,255,255,0.16); margin-top: 5px; flex-shrink: 0;
    }

    .bval {
      font-size: clamp(28px, 7.5vw, 38px);
      font-weight: 100; letter-spacing: -2px; line-height: 1.05;
      margin-top: 1px;
    }
    .bval .u { font-size: 11px; font-weight: 400; color: var(--muted); letter-spacing: 0; }

    .wind-row { display: flex; align-items: center; gap: 7px; margin-top: 2px; }
    .compass {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(80,210,170,0.30);
      position: relative; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .compass-arrow {
      width: 2px; height: 11px;
      background: linear-gradient(180deg, #64dcb4 0%, rgba(100,220,180,0.08) 100%);
      border-radius: 2px; transform-origin: center; position: absolute;
    }
    .compass-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .wind-dir { font-size: 10px; font-weight: 600; color: #64dcb4; }

    .gbar {
      height: 3px; border-radius: 2px; position: relative; margin-top: 5px; flex-shrink: 0;
    }
    .gbar.uv-grad   { background: linear-gradient(90deg,#4caf50 0%,#ffeb3b 30%,#ff9800 60%,#f44336 80%,#9c27b0 100%); }
    .gbar.soil-grad { background: linear-gradient(90deg,#4fc3f7 0%,#81c784 35%,#aed581 55%,#ffb74d 75%,#ef5350 100%); }
    .gdot {
      width: 8px; height: 8px; background: #fff; border-radius: 50%;
      position: absolute; top: 50%; transform: translate(-50%,-50%);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5); transition: left 1s ease;
    }

    .pdot {
      width: 5px; height: 5px; border-radius: 50%; background: #4a9eff;
      position: absolute; bottom: 10px; right: 11px;
      transition: background 0.6s ease;
    }
    @keyframes breathe {
      0%,100% { opacity:.35; transform:scale(1); }
      50%      { opacity:1;   transform:scale(1.5); }
    }
    .pdot { animation: breathe 2.5s ease-in-out infinite; }

    .tap-hint {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 3px);
      left: 0; right: 0; text-align: center;
      font-size: 8px; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.13); pointer-events: none; z-index: 10;
    }

    #lo {
      position: fixed; inset: 0; z-index: 50; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 11px;
      transition: opacity 0.5s ease;
    }
    #lo.gone { opacity: 0; pointer-events: none; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.08); border-top-color: #4a9eff;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .lmsg { font-size: 10px; color: var(--muted); letter-spacing: 0.10em; }
  </style>
</head>
<body>

<div id="lo"><div class="spinner"></div><div class="lmsg">Connecting…</div></div>

<div class="dashboard" id="dash">

  <!-- R1 C1-2: OUTDOOR -->
  <div class="card c-out g-outdoor">
    <div class="lbl">Outdoor</div>
    <div class="out-body">
      <div class="out-temp-wrap">
        <div class="out-temp" id="outTemp">--<span class="out-deg">°</span></div>
        <div class="out-feels" id="outFeels"></div>
      </div>
      <div class="out-stats">
        <div class="stat-row">
          <span class="stat-k">Humidity</span>
          <span class="stat-v" id="outHum">--%</span>
        </div>
        <div class="hum-track"><div class="hum-fill" id="humFill" style="width:0%"></div></div>
        <div class="stat-row" style="margin-top:2px">
          <span class="stat-k">Dew Point</span>
          <span class="stat-v" id="outDew">--°F</span>
        </div>
      </div>
    </div>
    <div class="updated" id="updatedAt">—</div>
  </div>

  <!-- R1 C3: WIND -->
  <div class="card c-wind g-wind">
    <div class="lbl">Wind</div>
    <div class="wind-row">
      <div class="compass">
        <div class="compass-arrow" id="windArrow"></div>
        <div class="compass-dot"></div>
      </div>
      <div>
        <div class="wind-dir" id="windDir">--</div>
        <div class="bval" id="windSpeed" style="font-size:clamp(20px,5.5vw,28px);letter-spacing:-1px">--<span class="u"> mph</span></div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="frows">
      <div class="frow"><span class="fk">Gust</span><span class="fv" id="windGust">--</span></div>
    </div>
  </div>

  <!-- R2 C1: RAIN -->
  <div class="card c-rain g-rain">
    <div class="lbl">Rain</div>
    <div class="bval" id="rainDaily">--<span class="u"> in</span></div>
    <div style="font-size:8px;color:var(--muted);margin-top:1px">today</div>
    <div class="spacer"></div>
    <div class="frows">
      <div class="frow"><span class="fk">Rate</span><span class="fv" id="rainRate">--</span></div>
      <div class="frow"><span class="fk">Week</span><span class="fv" id="rainWeekly">--</span></div>
    </div>
  </div>

  <!-- R2 C2: BARN -->
  <div class="card g-barn">
    <div class="lbl">Barn</div>
    <div class="bval" id="inTemp">--<span class="u">°F</span></div>
    <div class="spacer"></div>
    <div class="frows">
      <div class="frow"><span class="fk">Humidity</span><span class="fv" id="inHum">--%</span></div>
    </div>
  </div>

  <!-- R2 C3: PRESSURE -->
  <div class="card g-pressure">
    <div class="lbl">Pressure</div>
    <div class="bval" id="pressRel">--<span class="u"> inHg</span></div>
    <div class="spacer"></div>
    <div class="frows">
      <div class="frow"><span class="fk">Abs</span><span class="fv" id="pressAbs">--</span></div>
    </div>
  </div>

  <!-- R3 C1-2: SOLAR & UV -->
  <div class="card c-uv g-solar">
    <div class="lbl">Solar &amp; UV</div>
    <div style="display:flex;align-items:center;gap:16px;flex:1;min-height:0">
      <div>
        <div class="bval" id="solar">--<span class="u"> W/m²</span></div>
        <div style="font-size:8px;color:var(--muted);margin-top:2px">irradiance</div>
      </div>
      <div style="flex:1;min-width:0">
        <div class="frow"><span class="fk">UV Index</span><span class="fv" id="uvi" style="font-weight:600">--</span></div>
        <div class="gbar uv-grad" style="margin-top:6px"><div class="gdot" id="uvDot" style="left:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- R3 C3: SOIL TEMP -->
  <div class="card c-soil g-soil">
    <div class="lbl">Soil</div>
    <div class="bval" id="soilTemp">--<span class="u">°F</span></div>
    <div class="spacer"></div>
    <div class="frows">
      <div class="frow"><span class="fk">Status</span><span class="fv" id="soilZone" style="font-weight:600">--</span></div>
      <div class="gbar soil-grad"><div class="gdot" id="soilDot" style="left:0%"></div></div>
    </div>
    <div class="pdot" id="pulseDot"></div>
  </div>

</div>

<div class="tap-hint">TAP ANYWHERE FOR GRAPHS</div>

<script>
  const ECOWITT_URL = 'https://www.ecowitt.net/home/share?authorize=3244ES&device_id=ZVRZcStuWWx2QUxyN1dkeEVIbExNdz09';
  const API_KEY = '8c58870e-bbfd-405f-b785-ec7ed5663582';
  const APP_KEY = '11C8F21FCADE94BCE4B1CF1A04A72BAC';
  const MAC     = '88:57:21:1D:4C:6B';
  const INTERVAL = 60_000;

  document.body.addEventListener('click', () => window.open(ECOWITT_URL, '_blank'));

  const $ = id => document.getElementById(id);
  function txt(id, v)  { const e=$(id); if(e) e.textContent=v; }
  function htm(id, v)  { const e=$(id); if(e) e.innerHTML=v; }
  function gv(g, k, d=1) {
    const v = parseFloat(g?.[k]?.value);
    return isNaN(v) ? null : +v.toFixed(d);
  }
  function toCardinal(deg) {
    const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return d[Math.round(deg/22.5)%16];
  }
  function uvColor(u) {
    if(u<=2) return '#4caf50'; if(u<=5) return '#f9c22e';
    if(u<=7) return '#ff9800'; if(u<=10) return '#f44336';
    return '#9c27b0';
  }
  function soilZone(f) {
    if(f<40) return {l:'Dormant',c:'#4fc3f7',p:Math.max(0,(f/40)*15)};
    if(f<50) return {l:'Cold',   c:'#81c784',p:15+((f-40)/10)*15};
    if(f<65) return {l:'Cool',   c:'#aed581',p:30+((f-50)/15)*20};
    if(f<80) return {l:'Ideal',  c:'#66bb6a',p:50+((f-65)/15)*25};
    if(f<95) return {l:'Warm',   c:'#ffb74d',p:75+((f-80)/15)*15};
    return          {l:'Hot',    c:'#ef5350',p:100};
  }

  async function fetchWeather() {
    const p = new URLSearchParams({
      application_key: APP_KEY, api_key: API_KEY, mac: MAC,
      call_back: 'outdoor,indoor,wind,rainfall,rainfall_piezo,pressure,solar_and_uvi',
      temp_unitid:'2', pressure_unitid:'4', wind_speed_unitid:'9',
      rainfall_unitid:'12', solar_irradiance_unitid:'16'
    });
    try {
      const json = await fetch(`https://api.ecowitt.net/api/v3/device/real_time?${p}`).then(r=>r.json());
      if(json.code!==0) throw new Error(json.msg);
      const d = json.data;

      const oT = gv(d.outdoor,'temperature');
      htm('outTemp', oT!=null ? `${oT}<span class="out-deg">°</span>` : '--<span class="out-deg">°</span>');
      const feels = gv(d.outdoor,'feels_like') ?? gv(d.outdoor,'app_temp');
      const fe = $('outFeels');
      if(feels!=null && oT!=null && Math.abs(feels-oT)>=1) { fe.textContent=`Feels like ${feels}°F`; fe.style.display=''; }
      else fe.style.display='none';
      const hum = gv(d.outdoor,'humidity',0);
      txt('outHum', hum!=null ? `${hum}%` : '--%');
      $('humFill').style.width = hum!=null ? `${hum}%` : '0%';
      txt('outDew', (gv(d.outdoor,'dew_point')??'--')+'°F');

      const iT = gv(d.indoor,'temperature');
      htm('inTemp', iT!=null ? `${iT}<span class="u">°F</span>` : '--');
      txt('inHum', (gv(d.indoor,'humidity',0)??'--')+'%');

      const ws = gv(d.wind,'wind_speed');
      htm('windSpeed', ws!=null ? `${ws}<span class="u"> mph</span>` : '--');
      const wd = gv(d.wind,'wind_direction',0);
      if(wd!=null) { txt('windDir', toCardinal(wd)); $('windArrow').style.transform=`rotate(${wd+180}deg)`; }
      txt('windGust', (gv(d.wind,'wind_gust')??'--')+' mph');

      const rain = (Object.keys(d.rainfall_piezo??{}).length ? d.rainfall_piezo : null)
                ?? (Object.keys(d.rainfall??{}).length ? d.rainfall : null) ?? {};
      const toIn = v => v!=null ? +(v/25.4).toFixed(2) : null;
      const rd = toIn(gv(rain,'daily',4));
      htm('rainDaily', rd!=null ? `${rd}<span class="u"> in</span>` : `--<span class="u"> in</span>`);
      const rr = toIn(gv(rain,'rain_rate',4));
      txt('rainRate', rr!=null ? `${rr}/hr` : '--');
      txt('rainWeekly', (toIn(gv(rain,'weekly',4))??'--')+' in');

      const pr = gv(d.pressure,'relative',2);
      htm('pressRel', pr!=null ? `${pr}<span class="u"> inHg</span>` : '--');
      txt('pressAbs', (gv(d.pressure,'absolute',2)??'--')+' inHg');

      const sol = gv(d.solar_and_uvi,'solar',0);
      htm('solar', sol!=null ? `${sol}<span class="u"> W/m²</span>` : '--');
      const uvI = gv(d.solar_and_uvi,'uvi',0);
      if(uvI!=null) {
        const el=$('uvi'); el.textContent=uvI; el.style.color=uvColor(uvI);
        $('uvDot').style.left=`${Math.min(uvI/12,1)*100}%`;
      }

      txt('updatedAt', `Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`);
      flash('#34c759');
      $('lo').classList.add('gone');
      $('dash').classList.add('loaded');
    } catch(e) {
      console.error(e); txt('updatedAt','Fetch failed — retrying…'); flash('#ff453a');
    }
  }

  async function fetchSoilTemp() {
    for(const key of ['temp_ch1','temp_and_humidity_ch1']) {
      try {
        const p = new URLSearchParams({application_key:APP_KEY,api_key:API_KEY,mac:MAC,call_back:key,temp_unitid:'2'});
        const json = await fetch(`https://api.ecowitt.net/api/v3/device/real_time?${p}`).then(r=>r.json());
        if(json.code!==0) continue;
        const soilT = gv(json.data[key],'temperature');
        if(soilT==null) continue;
        htm('soilTemp',`${soilT}<span class="u">°F</span>`);
        const z = soilZone(soilT);
        const el=$('soilZone'); el.textContent=z.l; el.style.color=z.c;
        $('soilDot').style.left=`${Math.min(z.p,100)}%`;
        return;
      } catch(e) { /* try next */ }
    }
  }

  function flash(color) {
    const d=$('pulseDot'); d.style.background=color;
    setTimeout(()=>{ d.style.background='#4a9eff'; },1500);
  }

  fetchWeather();
  fetchSoilTemp();
  setInterval(fetchWeather, INTERVAL);
  setInterval(fetchSoilTemp, INTERVAL);
</script>
</body>
</html>
